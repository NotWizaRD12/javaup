<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskFlow - Something went wrong</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            transition: background 0.3s ease, color 0.3s ease;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        :root[data-bs-theme="light"] {
            --bg-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        :root[data-bs-theme="dark"] {
            --bg-color: #121212;
            --card-bg: rgba(30, 30, 30, 0.85);
        }

        .error-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .error-icon {
            font-size: 5rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <div class="error-card text-body">
        <i class="bi bi-exclamation-octagon-fill error-icon"></i>
        <h2 class="fw-bold mb-3">Oops! Something went wrong.</h2>
        <p class="text-muted mb-4"
            th:text="${errorMessage != null ? errorMessage : 'We could not process your request at this time.'}"></p>

        <a href="/" class="btn btn-primary btn-lg rounded-pill px-4 shadow-sm fw-semibold">
            <i class="bi bi-house-door-fill me-2"></i> Back to Dashboard
        </a>
    </div>

    <script>
        // Init theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
</body>

</html>
